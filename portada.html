<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Provalliance · Template Viajes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',system-ui,sans-serif;min-height:100vh;background:#faf9f6;color:#1a2235;}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.content{text-align:center;max-width:560px;width:100%;}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:3.5px;color:#8a94a3;text-transform:uppercase;margin-bottom:26px;}
.rule{width:36px;height:1px;background:#1a3a6b;margin:0 auto 26px;}
.brand{font-family:'Cormorant Garamond',Georgia,serif;font-size:52px;font-weight:600;letter-spacing:3px;color:#141c2e;margin-bottom:14px;}
.sub{font-size:13px;font-weight:400;letter-spacing:2px;color:#5a6a85;text-transform:uppercase;margin-bottom:52px;}
.cta{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:1px solid #1a3a6b;color:#1a3a6b;text-decoration:none;font-size:12.5px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;padding:15px 34px;transition:background .2s,color .2s;}
.cta:hover{background:#1a3a6b;color:#fff;}
.cta svg{width:13px;height:13px;transition:transform .2s;}
.cta:hover svg{transform:translateX(3px);}
.foot-rule{width:100%;max-width:200px;height:1px;background:#e4e2db;margin:56px auto 0;}
</style>
</head>
<body>

<div class="wrap">
  <div class="content">
    <div class="eyebrow">Gestión de gastos de viaje</div>
    <div class="rule"></div>
    <div class="brand">PROVALLIANCE</div>
    <div class="sub">Template Viajes</div>
    <a class="cta" href="dashboard-viajes.html">
      <span>Acceder al dashboard</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </div>
</div>

</body>
</html>
